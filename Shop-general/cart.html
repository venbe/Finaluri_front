<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart</title>
  <meta name="description" content="Review items in your cart and see your order total." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <nav class="nav wrap">
      <a href="index.html" class="brand">
        <span class="brand-mark">SG</span>
        Shop General.
      </a>
      <button class="nav-toggle" data-nav-toggle aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" data-nav-links>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Catalog</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li>
          <a href="cart.html" class="cart-link" aria-current="page">
            Cart <span class="cart-count" data-cart-count>0</span>
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="wrap split-shell">
      <aside class="panel-pin" data-cart-summary hidden></aside>

      <div class="panel-feed">
        <p class="eyebrow">Order ticket</p>
        <h1 style="margin-bottom:24px;">Your cart</h1>

        <p class="state-msg" data-cart-empty hidden>
          Your cart is empty. <a href="shop.html" style="text-decoration:underline;">Browse the catalog</a> to add something.
        </p>

        <div data-cart-list></div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-row">
      <p>&copy; 2026 Shop General.</p>
      <div class="footer-links">
        <a href="shop.html">Catalog</a>
        <a href="cart.html">Cart</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>
  <script src="js/common.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
